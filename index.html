<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dhwani">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23d946ef'/><circle cx='50' cy='50' r='25' fill='none' stroke='white' stroke-width='8'/><circle cx='50' cy='50' r='10' fill='white'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23d946ef'/><circle cx='50' cy='50' r='25' fill='none' stroke='white' stroke-width='8'/><circle cx='50' cy='50' r='10' fill='white'/></svg>">
    
    <title>Dhwani Premium | Bollywood Ringtones</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === PREMIUM PINK/PURPLE DARK THEME === */
        :root {
            --bg: #050505;
            --surface: rgba(24, 24, 28, 0.7);
            --surface-hover: rgba(40, 40, 45, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sec: #9ca3af;
            
            --accent: #d946ef;      /* Pink/Fuchsia */
            --accent-dark: #8b5cf6; /* Deep Purple */
            --accent-glow: rgba(217, 70, 239, 0.4);
            
            --player-h: 90px;
            --glass: blur(24px) saturate(200%);
            --font: 'Plus Jakarta Sans', sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 0px); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); -webkit-tap-highlight-color: transparent; }
        
        body, html {
            background-color: var(--bg); color: var(--text-main);
            overflow-x: hidden; scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            width: 100vw;
            max-width: 100%;
        }

        body {
            padding-bottom: calc(var(--player-h) + var(--safe-bottom) + 20px);
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 45%);
            z-index: -1; opacity: 0.3; pointer-events: none; transition: background 1.5s ease;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        /* === HEADER === */
        header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(5, 5, 5, 0.85); backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border); padding: 16px 5%;
            display: flex; justify-content: space-between; align-items: center; gap: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            padding-top: max(16px, env(safe-area-inset-top)); 
            width: 100%;
        }

        .brand { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; letter-spacing: -0.5px;}
        .brand i { background: linear-gradient(135deg, var(--accent), #ff90e8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px var(--accent-glow)); }

        .search-container { flex: 1; max-width: 500px; position: relative; }
        .search-bar { position: relative; display: flex; align-items: center; width: 100%; }
        .search-bar i { position: absolute; left: 18px; color: var(--text-sec); font-size: 16px;}
        
        .search-bar input {
            width: 100%; padding: 12px 16px 12px 50px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 30px; color: #fff; font-size: 16px !important; outline: none; transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .search-bar input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); box-shadow: 0 0 15px var(--accent-glow); }
        
        .nav-links { display: flex; gap: 10px; }
        .nav-btn {
            background: var(--surface); border: 1px solid var(--border); color: #fff;
            padding: 10px 18px; border-radius: 24px; cursor: pointer; font-weight: 600; font-size: 13px;
            transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .nav-btn:hover, .nav-btn.active { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        /* === HERO CAROUSEL === */
        .hero { margin: 20px 5%; border-radius: 24px; overflow: hidden; position: relative; height: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .carousel-inner { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide { min-width: 100%; height: 100%; position: relative; background-size: cover; background-position: center; }
        .slide::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0.1) 100%); }
        .slide-content { position: absolute; bottom: 40px; left: 40px; z-index: 2; max-width: 70%; }
        .slide-tag { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: inline-block; letter-spacing: 1px; box-shadow: 0 4px 15px var(--accent-glow);}
        .slide-title { font-size: 40px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; text-shadow: 0 4px 15px rgba(0,0,0,0.6); letter-spacing: -0.5px; }
        .slide-artist { font-size: 16px; color: #e5e7eb; margin-bottom: 20px; font-weight: 500; }
        
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 8px 25px var(--accent-glow); }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 12px 30px var(--accent-glow); }
        
        .carousel-nav { position: absolute; bottom: 20px; right: 30px; display: flex; gap: 8px; z-index: 2; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.4s; }
        .dot.active { background: var(--accent); width: 24px; border-radius: 4px; box-shadow: 0 0 10px var(--accent-glow); }

        /* === PREMIUM CATEGORY SLIDER (CHIPS) === */
        .slider-container { margin: 10px 5% 20px; position: relative; }
        .chips-wrapper { 
            display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; 
            padding: 10px 5px; cursor: grab; scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .chips-wrapper:active { cursor: grabbing; }
        .chips-wrapper::-webkit-scrollbar { display: none; }
        .chip {
            padding: 10px 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
            transition: all 0.3s; backdrop-filter: blur(10px); color: #e5e7eb; user-select: none;
        }
        .chip:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .chip.active { 
            background: linear-gradient(135deg, var(--accent), var(--accent-dark)); 
            color: #fff; border-color: transparent; 
            box-shadow: 0 6px 15px var(--accent-glow); 
        }

        /* === MAIN GRID === */
        .container { padding: 15px 5%; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .section-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; position: relative; display: inline-block; }
        .section-title::after { content: ''; position: absolute; bottom: -6px; left: 0; width: 35px; height: 3px; background: var(--accent); border-radius: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

        /* PREMIUM CARD */
        .card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
            padding: 12px; display: flex; align-items: center; gap: 14px; position: relative; overflow: hidden;
            transition: all 0.3s; backdrop-filter: blur(10px);
        }
        .card:hover { 
            background: rgba(255,255,255,0.08); transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); 
        }
        .card.playing { border-color: var(--accent); background: rgba(217, 70, 239, 0.08); box-shadow: 0 0 15px rgba(217, 70, 239, 0.15); }

        .card-img-wrapper { position: relative; width: 60px; height: 60px; flex-shrink: 0; cursor: pointer; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .card:hover .card-img { transform: scale(1.08); }
        .play-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; color: #fff; font-size: 20px;
        }
        .card:hover .play-overlay, .card.playing .play-overlay { opacity: 1; }

        .card-info { flex: 1; overflow: hidden; cursor: pointer; }
        .card-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; color: #fff;}
        .card-artist { font-size: 12px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500;}

        .card-actions { display: flex; gap: 4px; }
        .icon-btn {
            background: transparent; border: none; color: var(--text-sec); width: 34px; height: 34px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; font-size: 15px;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.1); }
        .icon-btn.liked { color: #ff3b3b; filter: drop-shadow(0 0 5px rgba(255,59,59,0.5)); }
        .icon-btn.downloading { animation: spin 1s linear infinite; pointer-events: none; color: var(--accent); }

        .ripple {
            position: absolute; border-radius: 50%; transform: scale(0);
            animation: ripple-anim 0.6s linear; background-color: rgba(255, 255, 255, 0.3); pointer-events: none;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* === STICKY PLAYER === */
        .player {
            position: fixed; bottom: 0; left: 0; width: 100%; height: calc(var(--player-h) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom); 
            background: rgba(10, 10, 12, 0.9); backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; padding-left: 5%; padding-right: 5%; z-index: 100;
            transition: transform 0.5s; transform: translateY(100%);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .player.active { transform: translateY(0); }

        .p-left { display: flex; align-items: center; gap: 12px; width: 30%; cursor: pointer; transition: transform 0.2s; }
        .p-left:hover { transform: translateX(3px); }
        .p-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .p-info { overflow: hidden; }
        .p-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color:#fff;}
        .p-artist { font-size: 12px; color: var(--text-sec); margin-top: 2px;}

        .p-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; max-width: 500px; }
        .p-controls { display: flex; align-items: center; gap: 20px; }
        .p-btn { background: none; border: none; color: var(--text-sec); font-size: 16px; cursor: pointer; transition: all 0.2s; position: relative;}
        .p-btn:hover { color: #fff; transform: scale(1.1); }
        .p-btn.active-state { color: var(--accent); }
        .p-btn.active-state::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 5px var(--accent);}
        
        .play-pause-btn {
            background: #fff; color: #000; width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 16px; transition: all 0.3s;
        }
        .play-pause-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.4); }

        .p-progress { display: flex; align-items: center; gap: 10px; width: 100%; font-size: 11px; color: var(--text-sec); font-variant-numeric: tabular-nums; font-weight: 500;}
        .progress-bar {
            flex: 1; -webkit-appearance: none; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 2px; cursor: pointer; transition: height 0.1s; position: relative; outline: none;
        }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; opacity: 0; transition: 0.2s; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .p-progress:hover .progress-bar { height: 6px; }
        .p-progress:hover .progress-bar::-webkit-slider-thumb { opacity: 1; }

        .p-right { width: 30%; display: flex; justify-content: flex-end; align-items: center; gap: 15px; }
        .volume-container { display: flex; align-items: center; gap: 8px; width: 90px; }
        .vol-slider { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; outline:none;}
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #fff; border-radius: 50%; cursor: pointer;}

        .waveform { display: flex; align-items: center; gap: 3px; height: 16px; margin-left: 10px; opacity: 0; }
        .waveform.playing { opacity: 1; }
        .bar { width: 3px; background: var(--accent); border-radius: 3px; animation: wave 1s ease-in-out infinite alternate; box-shadow: 0 0 5px var(--accent-glow);}
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0% { height: 4px; } 100% { height: 16px; } }

        /* === FULLSCREEN PLAYER === */
        .fs-player {
            position: fixed; inset: 0; background: var(--bg); z-index: 200;
            display: flex; flex-direction: column; padding: max(40px, env(safe-area-inset-top)) 5% max(40px, env(safe-area-inset-bottom));
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); opacity: 0; pointer-events: none;
            box-sizing: border-box;
        }
        .fs-player.active { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .fs-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(60px) brightness(0.3); z-index: -1; transform: scale(1.2);}
        
        .fs-header { display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: 700; margin-bottom: auto; letter-spacing: 1px; position: relative;}
        .fs-close { cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 50%; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1);}
        .fs-close:hover { background: rgba(255,255,255,0.15); transform: translateY(-3px); }

        /* 3 DOTS OPTIONS MENU */
        .fs-menu {
            position: absolute; top: 60px; right: 0; background: rgba(15,15,18,0.95);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
            padding: 8px 0; display: none; flex-direction: column; z-index: 250;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); width: 190px;
        }
        .fs-menu.active { display: flex; animation: fadeIn 0.2s; }
        .fs-menu-item { padding: 14px 20px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: 0.2s; color: #fff;}
        .fs-menu-item i { color: var(--text-sec); font-size: 16px; width: 18px; text-align: center;}
        .fs-menu-item:hover { background: rgba(255,255,255,0.08); }
        .fs-menu-item:hover i { color: var(--accent); }

        .fs-cover-container { width: 100%; max-width: 320px; aspect-ratio: 1; margin: 0 auto 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); overflow: hidden; position: relative;}
        .fs-cover { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .fs-cover.playing { transform: scale(1.05); }

        .fs-info { text-align: left; max-width: 500px; margin: 0 auto 30px; width: 100%; display: flex; justify-content: space-between; align-items: center;}
        .fs-title { font-size: 26px; font-weight: 800; margin-bottom: 5px; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        .fs-artist { font-size: 16px; color: rgba(255,255,255,0.7); font-weight: 500;}

        .fs-controls-wrap { max-width: 500px; margin: 0 auto; width: 100%; margin-bottom: auto;}
        .fs-progress { margin-bottom: 25px; }
        .fs-progress .progress-bar { height: 5px; }
        .fs-progress .progress-bar::-webkit-slider-thumb { width: 16px; height: 16px; opacity: 1; }
        .fs-time { display: flex; justify-content: space-between; font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 10px; font-weight: 600;}

        .fs-main-controls { display: flex; justify-content: space-between; align-items: center; padding: 0 10px;}
        .fs-btn { font-size: 22px; color: #fff; background: none; border: none; cursor: pointer; transition: all 0.2s; position: relative; }
        .fs-btn:hover { transform: scale(1.1); }
        .fs-btn.sec { font-size: 20px; color: rgba(255,255,255,0.6); }
        .fs-btn.sec.active-state { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow);}
        .fs-play { width: 65px; height: 65px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; border-radius: 50%; font-size: 26px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px var(--accent-glow); transition: all 0.3s;}
        .fs-play:hover { transform: scale(1.08); box-shadow: 0 15px 35px var(--accent-glow); }

        .toast {
            position: fixed; bottom: calc(var(--player-h) + var(--safe-bottom) + 20px); left: 50%; transform: translateX(-50%) translateY(50px);
            background: rgba(255,255,255,0.95); color: #000; padding: 12px 24px; border-radius: 30px; font-weight: 700; font-size: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); opacity: 0; transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 300; pointer-events: none; backdrop-filter: blur(10px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* === MOBILE RESPONSIVE FIXES === */
        @media (max-width: 768px) {
            header { 
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 15px 10px;
                padding: max(12px, env(safe-area-inset-top)) 5% 15px; 
                width: 100vw; box-sizing: border-box; 
            }
            .brand { grid-column: 1; }
            .nav-links { grid-column: 2; margin-left: auto; }
            .search-container { 
                grid-column: 1 / -1; 
                width: 100%; 
                max-width: 100%; 
                margin-top: 0; 
            }
            .nav-btn span { display: none; }
            
            .hero { height: 220px; margin: 15px 5%; border-radius: 20px;}
            .slide-title { font-size: 24px; }
            .slide-content { max-width: 85%; bottom: 20px; left: 20px; }
            .slide-tag { font-size: 10px; margin-bottom: 8px;}
            .slide-artist { font-size: 13px; margin-bottom: 12px;}
            .btn-primary { padding: 10px 18px; font-size: 12px;}

            .player { height: calc(75px + var(--safe-bottom)); width: 100vw; }
            .p-right { display: none; }
            .p-left { width: 60%; gap: 10px;}
            .p-img { width: 45px; height: 45px; border-radius: 8px; }
            .p-title { font-size: 14px; }
            .p-artist { font-size: 11px; }
            .p-center { width: 40%; align-items: flex-end; padding-right: 5px;}
            .p-progress, .p-btn:not(.play-pause-btn) { display: none; }
            .play-pause-btn { width: 36px; height: 36px; font-size: 14px; }
            
            .fs-cover-container { max-width: 280px; margin-bottom: 30px;}
            .fs-title { font-size: 24px; }
            .fs-artist { font-size: 15px; }
            .fs-play { width: 60px; height: 60px; font-size: 24px; }
            .fs-btn { font-size: 20px; }
            
            .section-title { font-size: 20px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            .card { flex-direction: column; align-items: flex-start; padding: 10px; gap: 10px;}
            .card-img-wrapper { width: 100%; height: 140px; }
            .card-info { width: 100%; }
            .card-actions { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg" id="ambientBg"></div>

    <header>
        <a href="#" class="brand" onclick="app.loadHome()"><i class="fa-solid fa-compact-disc fa-spin-pulse"></i> Dhwani</a>
        
        <div class="nav-links">
            <button class="nav-btn" onclick="app.loadPlaylists()"><i class="fa-solid fa-music"></i> <span>Playlists</span></button>
            <button class="nav-btn" onclick="app.loadFavorites()"><i class="fa-solid fa-heart"></i> <span>Liked</span></button>
        </div>

        <div class="search-container">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search Movies (e.g. Karan Arjun) or Artists">
            </div>
            </div>
    </header>

    <main id="mainContent">
        <div class="hero" id="heroSection">
            <div class="carousel-inner" id="carousel"></div>
            <div class="carousel-nav" id="carouselNav"></div>
        </div>

        <div class="slider-container">
            <div class="chips-wrapper" id="chipsContainer"></div>
        </div>

        <div class="container">
            <div class="section-header">
                <h2 class="section-title" id="gridTitle">Trending Bollywood</h2>
            </div>
            <div class="grid" id="tracksGrid"></div>
        </div>

        <div class="container" id="recSection">
            <div class="section-header">
                <h2 class="section-title">Recommended For You</h2>
            </div>
            <div class="grid" id="recGrid"></div>
        </div>
    </main>

    <div class="player" id="miniPlayer">
        <div class="p-left" onclick="app.toggleFullScreen()">
            <img src="" id="pCover" class="p-img" alt="Cover">
            <div class="p-info">
                <div class="p-title" id="pTitle">Song Title</div>
                <div class="p-artist" id="pArtist">Artist</div>
            </div>
            <div class="waveform" id="pWaveform">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>

        <div class="p-center">
            <div class="p-controls">
                <button class="p-btn" onclick="app.player.toggleShuffle()" id="btnMiniShuffle"><i class="fa-solid fa-shuffle"></i></button>
                <button class="p-btn" onclick="app.player.prev()"><i class="fa-solid fa-backward-step"></i></button>
                <button class="play-pause-btn" onclick="app.player.togglePlay()" id="btnMiniPlay"><i class="fa-solid fa-play"></i></button>
                <button class="p-btn" onclick="app.player.next()"><i class="fa-solid fa-forward-step"></i></button>
                <button class="p-btn" onclick="app.player.toggleLoop()" id="btnMiniLoop"><i class="fa-solid fa-repeat"></i></button>
            </div>
            <div class="p-progress">
                <span id="timeCurrent">0:00</span>
                <input type="range" class="progress-bar" id="miniProgress" value="0" min="0" max="100">
                <span id="timeTotal">0:00</span>
            </div>
        </div>

        <div class="p-right">
            <button class="p-btn" onclick="app.utils.shareCurrent()"><i class="fa-solid fa-share-nodes"></i></button>
            <div class="volume-container">
                <i class="fa-solid fa-volume-low p-btn"></i>
                <input type="range" class="vol-slider" id="volSlider" value="100" min="0" max="100">
            </div>
        </div>
    </div>

    <div class="fs-player" id="fsPlayer">
        <div class="fs-bg" id="fsBg"></div>
        
        <div class="fs-header">
            <i class="fa-solid fa-chevron-down fs-close" onclick="app.toggleFullScreen()"></i>
            <span>Now Playing</span>
            <div style="position: relative;">
                <i class="fa-solid fa-ellipsis fs-close" id="btnFsMenu" onclick="app.toggleFsMenu()"></i>
                <div class="fs-menu" id="fsMenu">
                    <div class="fs-menu-item" onclick="app.utils.downloadCurrent()"><i class="fa-solid fa-download"></i> Download Song</div>
                    <div class="fs-menu-item" onclick="app.utils.addCurrentToPlaylist()"><i class="fa-solid fa-plus"></i> Add to Playlist</div>
                    <div class="fs-menu-item" onclick="app.toggleFavoriteCurrent()"><i class="fa-solid fa-heart"></i> Add to Liked</div>
                    <div class="fs-menu-item" onclick="app.utils.shareCurrent()"><i class="fa-solid fa-share-nodes"></i> Share Link</div>
                </div>
            </div>
        </div>

        <div class="fs-cover-container">
            <img src="" id="fsCover" class="fs-cover" alt="Cover">
        </div>

        <div class="fs-info">
            <div>
                <div class="fs-title" id="fsTitle">Song Title</div>
                <div class="fs-artist" id="fsArtist">Artist</div>
            </div>
            <button class="icon-btn fs-btn" style="color: var(--text-sec);" id="btnFsLike" onclick="app.toggleFavoriteCurrent()">
                <i class="fa-regular fa-heart"></i>
            </button>
        </div>

        <div class="fs-controls-wrap">
            <div class="fs-progress">
                <input type="range" class="progress-bar" id="fsProgress" value="0" min="0" max="100" style="width: 100%;">
                <div class="fs-time">
                    <span id="fsTimeCurrent">0:00</span>
                    <span id="fsTimeTotal">0:00</span>
                </div>
            </div>

            <div class="fs-main-controls">
                <button class="fs-btn sec" onclick="app.player.toggleShuffle()" id="btnFsShuffle"><i class="fa-solid fa-shuffle"></i></button>
                <button class="fs-btn" onclick="app.player.prev()"><i class="fa-solid fa-backward-step"></i></button>
                <button class="fs-play" onclick="app.player.togglePlay()" id="btnFsPlay"><i class="fa-solid fa-play" style="margin-left:4px;"></i></button>
                <button class="fs-btn" onclick="app.player.next()"><i class="fa-solid fa-forward-step"></i></button>
                <button class="fs-btn sec" onclick="app.player.toggleLoop()" id="btnFsLoop"><i class="fa-solid fa-repeat"></i></button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const app = {
            state: {
                tracks: [], 
                heroTracks: [], 
                recTracks: [], 
                allContextTracks: [], 
                currentIndex: -1,
                isPlaying: false,
                audio: new Audio(),
                loop: 0, 
                shuffle: false,
                favorites: JSON.parse(localStorage.getItem('dhwani_favs')) || [],
                playlists: JSON.parse(localStorage.getItem('dhwani_playlists')) || { "My Playlist": [] },
                categories: ["Trending", "Arijit Singh Special", "90s Bollywood", "Neha Kakkar", "Atif Aslam", "Love", "Sad", "Party Hindi", "LoFi Hindi", "Remix", "DJ", "Dialogues", "Instrumental", "Sufi", "Punjabi"],
                activeCategory: "Trending",
                view: 'home', 
            },

            dom: {
                grid: document.getElementById('tracksGrid'),
                gridTitle: document.getElementById('gridTitle'),
                recGrid: document.getElementById('recGrid'),
                recSection: document.getElementById('recSection'),
                heroSection: document.getElementById('heroSection'),
                chipsContainer: document.getElementById('chipsContainer'),
                searchInput: document.getElementById('searchInput'),
                toast: document.getElementById('toast'),
                ambientBg: document.getElementById('ambientBg'),
                
                miniPlayer: document.getElementById('miniPlayer'),
                pCover: document.getElementById('pCover'),
                pTitle: document.getElementById('pTitle'),
                pArtist: document.getElementById('pArtist'),
                btnMiniPlay: document.getElementById('btnMiniPlay'),
                btnMiniShuffle: document.getElementById('btnMiniShuffle'),
                btnMiniLoop: document.getElementById('btnMiniLoop'),
                miniProgress: document.getElementById('miniProgress'),
                timeCurrent: document.getElementById('timeCurrent'),
                timeTotal: document.getElementById('timeTotal'),
                pWaveform: document.getElementById('pWaveform'),
                volSlider: document.getElementById('volSlider'),
                
                fsPlayer: document.getElementById('fsPlayer'),
                fsBg: document.getElementById('fsBg'),
                fsCover: document.getElementById('fsCover'),
                fsTitle: document.getElementById('fsTitle'),
                fsArtist: document.getElementById('fsArtist'),
                btnFsPlay: document.getElementById('btnFsPlay'),
                btnFsLike: document.getElementById('btnFsLike'),
                btnFsShuffle: document.getElementById('btnFsShuffle'),
                btnFsLoop: document.getElementById('btnFsLoop'),
                fsProgress: document.getElementById('fsProgress'),
                fsTimeCurrent: document.getElementById('fsTimeCurrent'),
                fsTimeTotal: document.getElementById('fsTimeTotal'),
                fsMenu: document.getElementById('fsMenu')
            },

            init() {
                this.ui.renderChips();
                this.ui.setupSliderDrag(); 
                this.bindEvents();
                this.loadHome();
                
                this.state.audio.addEventListener('timeupdate', () => this.ui.updateProgress());
                this.state.audio.addEventListener('ended', () => this.player.handleEnded());
                this.state.audio.addEventListener('loadedmetadata', () => this.ui.updateProgress());
            },

            bindEvents() {
                // FIXED: Direct search on Enter. No dropdown list anymore.
                this.dom.searchInput.addEventListener('keypress', (e) => {
                    if(e.key === 'Enter') {
                        const q = this.dom.searchInput.value.trim();
                        this.dom.searchInput.blur(); // Hides keyboard on mobile
                        if(q) {
                            this.loadCategory(q);
                        }
                    }
                });

                const setProgress = (e) => {
                    if(!this.state.audio.duration) return;
                    const pct = e.target.value;
                    this.state.audio.currentTime = (pct / 100) * this.state.audio.duration;
                };
                this.dom.miniProgress.addEventListener('input', setProgress);
                this.dom.fsProgress.addEventListener('input', setProgress);

                this.dom.volSlider.addEventListener('input', (e) => {
                    this.state.audio.volume = e.target.value / 100;
                    this.ui.updateProgressGradients();
                });

                // Global ripple and menu close listener
                document.addEventListener('click', (e) => {
                    const btn = e.target.closest('button, .card, .chip');
                    if (btn) this.utils.createRipple(e, btn);
                    
                    // Close 3-dot menu if clicked outside
                    if(!e.target.closest('#fsMenu') && !e.target.closest('#btnFsMenu')) {
                        if(this.dom.fsMenu.classList.contains('active')) {
                            this.dom.fsMenu.classList.remove('active');
                        }
                    }
                });
            },

            api: {
                async fetchTracks(query, limit=20) {
                    try {
                        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=${limit}&country=IN`);
                        const data = await res.json();
                        return data.results.filter(t => t.previewUrl).map(t => ({
                            id: t.trackId.toString(),
                            title: t.trackName,
                            artist: t.artistName,
                            cover: t.artworkUrl100.replace('100x100', '300x300'),
                            coverLarge: t.artworkUrl100.replace('100x100', '600x600'),
                            preview: t.previewUrl
                        }));
                    } catch (e) {
                        console.error("API Error:", e);
                        app.utils.showToast("Network error. Please try again.");
                        return [];
                    }
                }
            },

            ui: {
                renderChips() {
                    app.dom.chipsContainer.innerHTML = app.state.categories.map(c => `
                        <div class="chip ${app.state.activeCategory === c && app.state.view === 'home' ? 'active' : ''}" 
                             onclick="app.loadCategory('${c}')">${c}</div>
                    `).join('');
                },
                setupSliderDrag() {
                    const slider = app.dom.chipsContainer;
                    let isDown = false;
                    let startX;
                    let scrollLeft;

                    slider.addEventListener('mousedown', (e) => {
                        isDown = true;
                        slider.style.cursor = 'grabbing';
                        startX = e.pageX - slider.offsetLeft;
                        scrollLeft = slider.scrollLeft;
                    });
                    slider.addEventListener('mouseleave', () => { isDown = false; slider.style.cursor = 'grab'; });
                    slider.addEventListener('mouseup', () => { isDown = false; slider.style.cursor = 'grab'; });
                    slider.addEventListener('mousemove', (e) => {
                        if (!isDown) return;
                        e.preventDefault();
                        const x = e.pageX - slider.offsetLeft;
                        const walk = (x - startX) * 2; 
                        slider.scrollLeft = scrollLeft - walk;
                    });
                },
                renderSkeletons(container, count=12) {
                    container.innerHTML = Array(count).fill().map(() => `
                        <div class="card" style="pointer-events:none; border-color:transparent;">
                            <div class="skeleton" style="width:60px; height:60px; border-radius:12px;"></div>
                            <div style="flex:1;">
                                <div class="skeleton" style="height:14px; width:70%; margin-bottom:10px;"></div>
                                <div class="skeleton" style="height:12px; width:40%;"></div>
                            </div>
                        </div>
                    `).join('');
                },
                renderGrid(list = app.state.tracks, container = app.dom.grid, context = 'main') {
                    if(list.length === 0) {
                        container.innerHTML = `<div style="grid-column: 1/-1; padding: 40px; text-align:center; color: var(--text-sec); font-size:16px;">No tracks found. Try a different search!</div>`;
                        return;
                    }
                    container.innerHTML = list.map((track, i) => {
                        const isFav = app.utils.isFav(track.id);
                        const isPlaying = (app.state.allContextTracks[app.state.currentIndex]?.id === track.id) && app.state.isPlaying;
                        const isCurrent = app.state.allContextTracks[app.state.currentIndex]?.id === track.id;
                        
                        return `
                            <div class="card ${isCurrent ? 'playing' : ''}" id="card-${context}-${i}">
                                <div class="card-img-wrapper" onclick="app.player.playTrack(${i}, '${context}')">
                                    <img src="${track.cover}" class="card-img" loading="lazy">
                                    <div class="play-overlay"><i class="fa-solid fa-${isPlaying ? 'pause' : 'play'}"></i></div>
                                </div>
                                <div class="card-info" onclick="app.player.playTrack(${i}, '${context}')">
                                    <div class="card-title">${track.title}</div>
                                    <div class="card-artist">${track.artist}</div>
                                </div>
                                <div class="card-actions">
                                    <button class="icon-btn ${isFav ? 'liked' : ''}" onclick="app.toggleFavorite(event, '${track.id}', '${encodeURIComponent(JSON.stringify(track))}')">
                                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                                    </button>
                                    <button class="icon-btn" onclick="app.addToPlaylistPrompt(event, '${encodeURIComponent(JSON.stringify(track))}')">
                                        <i class="fa-solid fa-plus"></i>
                                    </button>
                                    <button class="icon-btn" onclick="app.utils.downloadTrack(event, '${track.preview}', '${track.title}')">
                                        <i class="fa-solid fa-download"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('');
                },
                renderHero(tracks) {
                    if(!tracks.length) return;
                    app.dom.heroSection.style.display = 'block';
                    
                    const carousel = document.getElementById('carousel');
                    const nav = document.getElementById('carouselNav');
                    
                    carousel.innerHTML = tracks.map((t, i) => `
                        <div class="slide" style="background-image: url('${t.coverLarge}')">
                            <div class="slide-content">
                                <div class="slide-tag">Trending #${i+1}</div>
                                <div class="slide-title">${t.title}</div>
                                <div class="slide-artist">${t.artist}</div>
                                <button class="btn-primary" onclick="app.player.playTrack(${i}, 'hero')">
                                    <i class="fa-solid fa-play"></i> Play Now
                                </button>
                            </div>
                        </div>
                    `).join('');
                    
                    nav.innerHTML = tracks.map((_, i) => `<div class="dot ${i===0?'active':''}" onclick="app.ui.goToSlide(${i})"></div>`).join('');
                    
                    let currentSlide = 0;
                    clearInterval(app.state.carouselInterval);
                    app.state.carouselInterval = setInterval(() => {
                        currentSlide = (currentSlide + 1) % tracks.length;
                        this.goToSlide(currentSlide);
                    }, 4000);
                },
                goToSlide(index) {
                    const carousel = document.getElementById('carousel');
                    const dots = document.querySelectorAll('.dot');
                    carousel.style.transform = `translateX(-${index * 100}%)`;
                    dots.forEach(d => d.classList.remove('active'));
                    if(dots[index]) dots[index].classList.add('active');
                },
                syncCards() {
                    document.querySelectorAll('.card').forEach(c => {
                        c.classList.remove('playing');
                        const icon = c.querySelector('.play-overlay i');
                        if(icon) icon.className = 'fa-solid fa-play';
                    });
                    
                    const activeTrackId = app.state.allContextTracks[app.state.currentIndex]?.id;
                    if(!activeTrackId) return;

                    document.querySelectorAll('.card').forEach(c => {
                        const onClickAttr = c.querySelector('.card-info').getAttribute('onclick');
                        const match = onClickAttr.match(/playTrack\((\d+),\s*'([^']+)'\)/);
                        if(match) {
                            const idx = parseInt(match[1]);
                            const ctx = match[2];
                            
                            let list = ctx === 'main' ? app.state.tracks : (ctx === 'hero' ? app.state.heroTracks : app.state.recTracks);
                            
                            if(list[idx]?.id === activeTrackId) {
                                c.classList.add('playing');
                                const icon = c.querySelector('.play-overlay i');
                                if(icon) icon.className = `fa-solid fa-${app.state.isPlaying ? 'pause' : 'play'}`;
                            }
                        }
                    });
                },
                syncPlayerUI() {
                    const track = app.state.allContextTracks[app.state.currentIndex];
                    if(!track) return;

                    app.dom.miniPlayer.classList.add('active');
                    app.dom.pCover.src = track.cover;
                    app.dom.pTitle.textContent = track.title;
                    app.dom.pArtist.textContent = track.artist;
                    app.dom.btnMiniPlay.innerHTML = `<i class="fa-solid fa-${app.state.isPlaying ? 'pause' : 'play'}" style="margin-left:${app.state.isPlaying?0:3}px"></i>`;
                    app.dom.pWaveform.classList.toggle('playing', app.state.isPlaying);
                    
                    app.dom.fsBg.style.backgroundImage = `url('${track.coverLarge}')`;
                    app.dom.fsCover.src = track.coverLarge;
                    app.dom.fsCover.classList.toggle('playing', app.state.isPlaying);
                    app.dom.fsTitle.textContent = track.title;
                    app.dom.fsArtist.textContent = track.artist;
                    app.dom.btnFsPlay.innerHTML = `<i class="fa-solid fa-${app.state.isPlaying ? 'pause' : 'play'}" style="margin-left:${app.state.isPlaying?0:4}px"></i>`;
                    
                    const isFav = app.utils.isFav(track.id);
                    app.dom.btnFsLike.innerHTML = `<i class="fa-${isFav?'solid':'regular'} fa-heart" style="color: ${isFav?'#ff3b3b':'inherit'}; filter: ${isFav?'drop-shadow(0 0 5px rgba(255,59,59,0.5))':'none'}"></i>`;

                    app.dom.ambientBg.style.background = `radial-gradient(circle at 50% 0%, ${this.getRandomAccent()}, transparent 45%)`;
                },
                updateProgress() {
                    const { currentTime, duration } = app.state.audio;
                    if(isNaN(duration)) return;
                    
                    const pct = (currentTime / duration) * 100;
                    app.dom.miniProgress.value = pct;
                    app.dom.fsProgress.value = pct;
                    
                    const curFormat = app.utils.formatTime(currentTime);
                    const totFormat = app.utils.formatTime(duration);
                    
                    app.dom.timeCurrent.textContent = curFormat;
                    app.dom.fsTimeCurrent.textContent = curFormat;
                    app.dom.timeTotal.textContent = totFormat;
                    app.dom.fsTimeTotal.textContent = totFormat;

                    this.updateProgressGradients();
                },
                updateProgressGradients() {
                    const mVal = app.dom.miniProgress.value;
                    const fVal = app.dom.fsProgress.value;
                    const vVal = app.dom.volSlider.value;
                    app.dom.miniProgress.style.background = `linear-gradient(to right, var(--accent) ${mVal}%, rgba(255,255,255,0.1) ${mVal}%)`;
                    app.dom.fsProgress.style.background = `linear-gradient(to right, #fff ${fVal}%, rgba(255,255,255,0.2) ${fVal}%)`;
                    app.dom.volSlider.style.background = `linear-gradient(to right, #fff ${vVal}%, rgba(255,255,255,0.2) ${vVal}%)`;
                },
                getRandomAccent() {
                    const colors = ['rgba(217, 70, 239, 0.4)', 'rgba(139, 92, 246, 0.4)', 'rgba(255, 144, 232, 0.4)'];
                    return colors[Math.floor(Math.random() * colors.length)];
                }
            },

            player: {
                playTrack(index, contextStr) {
                    let sourceList = [];
                    if(contextStr === 'main') sourceList = app.state.tracks;
                    else if(contextStr === 'rec') sourceList = app.state.recTracks;
                    else if(contextStr === 'hero') sourceList = app.state.heroTracks;

                    if(app.state.allContextTracks !== sourceList || app.state.currentIndex !== index) {
                        app.state.allContextTracks = sourceList;
                        app.state.currentIndex = index;
                        const track = sourceList[index];
                        app.state.audio.src = track.preview;
                    }
                    
                    this.play();
                },
                togglePlay() {
                    if(!app.state.audio.src) return;
                    if(app.state.isPlaying) this.pause();
                    else this.play();
                },
                play() {
                    app.state.audio.play();
                    app.state.isPlaying = true;
                    app.ui.syncPlayerUI();
                    app.ui.syncCards();
                },
                pause() {
                    app.state.audio.pause();
                    app.state.isPlaying = false;
                    app.ui.syncPlayerUI();
                    app.ui.syncCards();
                },
                next() {
                    if(!app.state.allContextTracks.length) return;
                    let nextIdx = app.state.currentIndex + 1;
                    if(app.state.shuffle) {
                        nextIdx = Math.floor(Math.random() * app.state.allContextTracks.length);
                    } else if(nextIdx >= app.state.allContextTracks.length) {
                        nextIdx = 0;
                    }
                    app.state.currentIndex = nextIdx;
                    const track = app.state.allContextTracks[nextIdx];
                    app.state.audio.src = track.preview;
                    this.play();
                },
                prev() {
                    if(!app.state.allContextTracks.length) return;
                    if(app.state.audio.currentTime > 3) {
                        app.state.audio.currentTime = 0;
                        return;
                    }
                    let prevIdx = app.state.currentIndex - 1;
                    if(prevIdx < 0) prevIdx = app.state.allContextTracks.length - 1;
                    app.state.currentIndex = prevIdx;
                    const track = app.state.allContextTracks[prevIdx];
                    app.state.audio.src = track.preview;
                    this.play();
                },
                handleEnded() {
                    if(app.state.loop === 2) { 
                        app.state.audio.currentTime = 0;
                        this.play();
                    } else {
                        this.next();
                    }
                },
                toggleShuffle() {
                    app.state.shuffle = !app.state.shuffle;
                    app.dom.btnMiniShuffle.classList.toggle('active-state', app.state.shuffle);
                    app.dom.btnFsShuffle.classList.toggle('active-state', app.state.shuffle);
                    app.utils.showToast(app.state.shuffle ? "Shuffle On" : "Shuffle Off");
                },
                toggleLoop() {
                    app.state.loop = (app.state.loop + 1) % 3; 
                    const isActive = app.state.loop > 0;
                    const isOne = app.state.loop === 2;
                    
                    // FIXED: Added a small indicator '1' when loop is single so it doesn't disappear
                    const loopHtml = `<i class="fa-solid fa-repeat"></i>${isOne ? '<span style="font-size:10px; position:absolute; right:-6px; top:-4px; font-weight:800; color:var(--accent);">1</span>' : ''}`;
                    
                    app.dom.btnMiniLoop.classList.toggle('active-state', isActive);
                    app.dom.btnMiniLoop.innerHTML = loopHtml;
                    
                    app.dom.btnFsLoop.classList.toggle('active-state', isActive);
                    app.dom.btnFsLoop.innerHTML = loopHtml;
                    
                    app.utils.showToast(app.state.loop === 0 ? "Loop Off" : (app.state.loop===1 ? "Loop All" : "Loop One"));
                }
            },

            async loadHome() {
                this.state.view = 'home';
                this.state.activeCategory = "Trending";
                this.ui.renderChips();
                this.dom.heroSection.style.display = 'block';
                this.dom.recSection.style.display = 'block';
                this.dom.gridTitle.textContent = "Trending Bollywood";
                
                this.ui.renderSkeletons(this.dom.grid, 12);
                this.ui.renderSkeletons(this.dom.recGrid, 6);

                const [main, rec] = await Promise.all([
                    this.api.fetchTracks("latest bollywood"),
                    this.api.fetchTracks("arijit singh romantic")
                ]);
                
                this.state.heroTracks = main.slice(0, 5);
                this.state.tracks = main.slice(5); 
                this.state.recTracks = rec;
                
                this.ui.renderHero(this.state.heroTracks);
                this.ui.renderGrid(this.state.tracks, this.dom.grid, 'main');
                this.ui.renderGrid(this.state.recTracks, this.dom.recGrid, 'rec');
                this.ui.syncCards();
            },

            async loadCategory(cat) {
                this.state.view = 'home';
                this.state.activeCategory = cat;
                this.ui.renderChips();
                
                this.dom.heroSection.style.display = 'none'; 
                this.dom.gridTitle.textContent = cat + " Selection";
                this.ui.renderSkeletons(this.dom.grid, 12);

                const tracks = await this.api.fetchTracks(cat);
                this.state.tracks = tracks;
                this.ui.renderGrid(this.state.tracks, this.dom.grid, 'main');
                this.ui.syncCards();
            },

            loadFavorites() {
                this.state.view = 'fav';
                this.state.activeCategory = "";
                this.ui.renderChips();
                
                this.dom.heroSection.style.display = 'none';
                this.dom.recSection.style.display = 'none';
                this.dom.gridTitle.textContent = "Liked Songs";
                
                this.state.tracks = [...this.state.favorites];
                this.ui.renderGrid(this.state.tracks, this.dom.grid, 'main');
                this.ui.syncCards();
            },

            loadPlaylists() {
                this.state.view = 'playlist';
                this.state.activeCategory = "";
                this.ui.renderChips();
                
                this.dom.heroSection.style.display = 'none';
                this.dom.recSection.style.display = 'none';
                
                const plNames = Object.keys(this.state.playlists);
                this.dom.gridTitle.innerHTML = `Your Playlists <button class="btn-primary" style="font-size:12px; padding:6px 12px; display:inline-block; margin-left:15px; box-shadow:none;" onclick="app.createNewPlaylist()">+ New</button>`;
                
                if(plNames.length === 0) {
                    this.dom.grid.innerHTML = `<div style="grid-column: 1/-1; padding: 40px; text-align:center; color: var(--text-sec); font-size:16px;">No playlists created yet.</div>`;
                    return;
                }

                // FIXED: Replaced fa-list-music with standard icons (fa-compact-disc) to ensure rendering on free versions
                this.dom.grid.innerHTML = plNames.map(name => `
                    <div class="card" style="cursor:pointer;" onclick="app.viewPlaylist('${name}')">
                        <div class="card-img-wrapper" style="background:linear-gradient(135deg, var(--accent), var(--accent-dark)); display:flex; align-items:center; justify-content:center; font-size:24px; color:#fff; box-shadow:0 4px 15px var(--accent-glow);">
                            <i class="fa-solid fa-compact-disc"></i>
                        </div>
                        <div class="card-info">
                            <div class="card-title">${name}</div>
                            <div class="card-artist">${this.state.playlists[name].length} Tracks</div>
                        </div>
                    </div>
                `).join('');
            },

            viewPlaylist(name) {
                this.dom.gridTitle.textContent = name;
                this.state.tracks = this.state.playlists[name] || [];
                this.ui.renderGrid(this.state.tracks, this.dom.grid, 'main');
                this.ui.syncCards();
            },

            toggleFullScreen() {
                this.dom.fsPlayer.classList.toggle('active');
            },
            
            toggleFsMenu() {
                this.dom.fsMenu.classList.toggle('active');
            },

            toggleFavorite(e, id, trackStr) {
                e.stopPropagation();
                const btn = e.currentTarget;
                const track = JSON.parse(decodeURIComponent(trackStr));
                
                const idx = this.state.favorites.findIndex(t => t.id === id);
                if(idx > -1) {
                    this.state.favorites.splice(idx, 1);
                    btn.classList.remove('liked');
                    btn.innerHTML = '<i class="fa-regular fa-heart"></i>';
                    this.utils.showToast("Removed from Liked");
                    if(this.state.view === 'fav') this.loadFavorites(); 
                } else {
                    this.state.favorites.push(track);
                    btn.classList.add('liked');
                    btn.innerHTML = '<i class="fa-solid fa-heart"></i>';
                    this.utils.showToast("Added to Liked");
                }
                localStorage.setItem('dhwani_favs', JSON.stringify(this.state.favorites));
                this.ui.syncPlayerUI();
            },

            toggleFavoriteCurrent() {
                this.dom.fsMenu.classList.remove('active');
                const track = this.state.allContextTracks[this.state.currentIndex];
                if(!track) return;
                const idx = this.state.favorites.findIndex(t => t.id === track.id);
                if(idx > -1) {
                    this.state.favorites.splice(idx, 1);
                    this.utils.showToast("Removed from Liked");
                } else {
                    this.state.favorites.push(track);
                    this.utils.showToast("Added to Liked");
                }
                localStorage.setItem('dhwani_favs', JSON.stringify(this.state.favorites));
                this.ui.syncPlayerUI();
                
                if(this.state.view === 'fav') this.loadFavorites();
                else this.ui.renderGrid(this.state.tracks, this.dom.grid, 'main');
            },

            createNewPlaylist() {
                const name = prompt("Enter Playlist Name:");
                if(name && name.trim()) {
                    if(!this.state.playlists[name]) {
                        this.state.playlists[name] = [];
                        localStorage.setItem('dhwani_playlists', JSON.stringify(this.state.playlists));
                        this.loadPlaylists();
                        this.utils.showToast("Playlist created");
                    } else {
                        this.utils.showToast("Playlist already exists");
                    }
                }
            },

            // FIXED: Smart Add To Playlist Logic (No useless prompts if you have 0 or 1 playlist)
            addToPlaylistPrompt(e, trackStr) {
                if(e) e.stopPropagation();
                const track = JSON.parse(decodeURIComponent(trackStr));
                const plNames = Object.keys(this.state.playlists);
                
                // Case 1: No playlist exists -> Create default and add
                if(plNames.length === 0) {
                    this.state.playlists["My Playlist"] = [track];
                    localStorage.setItem('dhwani_playlists', JSON.stringify(this.state.playlists));
                    this.utils.showToast("Added to My Playlist");
                    return;
                }
                
                // Case 2: Only 1 playlist exists -> Add directly to it
                if(plNames.length === 1) {
                    const pName = plNames[0];
                    if(!this.state.playlists[pName].find(t => t.id === track.id)) {
                        this.state.playlists[pName].push(track);
                        localStorage.setItem('dhwani_playlists', JSON.stringify(this.state.playlists));
                        this.utils.showToast(`Added to ${pName}`);
                    } else {
                        this.utils.showToast("Already in playlist");
                    }
                    return;
                }
                
                // Case 3: More than 1 playlist -> Prompt user to select
                const msg = "Select Playlist (Enter Number):\n" + plNames.map((n, i) => `${i+1}. ${n}`).join('\n');
                const choice = prompt(msg);
                if(choice && !isNaN(choice)) {
                    const idx = parseInt(choice) - 1;
                    if(plNames[idx]) {
                        const pName = plNames[idx];
                        if(!this.state.playlists[pName].find(t => t.id === track.id)) {
                            this.state.playlists[pName].push(track);
                            localStorage.setItem('dhwani_playlists', JSON.stringify(this.state.playlists));
                            this.utils.showToast(`Added to ${pName}`);
                        } else {
                            this.utils.showToast("Already in playlist");
                        }
                    }
                }
            },

            utils: {
                isFav(id) {
                    return app.state.favorites.some(t => t.id === id);
                },
                formatTime(sec) {
                    const m = Math.floor(sec / 60);
                    const s = Math.floor(sec % 60);
                    return `${m}:${s < 10 ? '0' : ''}${s}`;
                },
                showToast(msg) {
                    app.dom.toast.textContent = msg;
                    app.dom.toast.classList.add('show');
                    setTimeout(() => app.dom.toast.classList.remove('show'), 3000);
                },
                createRipple(e, btn) {
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const ripple = document.createElement('span');
                    ripple.className = 'ripple';
                    ripple.style.left = `${x}px`;
                    ripple.style.top = `${y}px`;
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = `${size}px`;
                    ripple.style.marginLeft = ripple.style.marginTop = `${-size/2}px`;
                    
                    if(btn.style.position !== 'absolute') btn.style.position = 'relative';
                    btn.style.overflow = 'hidden';
                    
                    btn.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                },
                async processDownload(url, title, btn) {
                    if(btn) {
                        btn.classList.add('downloading');
                        btn.innerHTML = '<i class="fa-solid fa-spinner"></i>';
                    }
                    try {
                        const res = await fetch(url);
                        const blob = await res.blob();
                        const blobUrl = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = blobUrl;
                        a.download = `Dhwani_${title.replace(/[^a-zA-Z0-9]/g, '_')}.m4a`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(blobUrl);
                        app.utils.showToast(`Downloaded: ${title}`);
                    } catch (err) {
                        app.utils.showToast("Download failed");
                    } finally {
                        if(btn) {
                            btn.classList.remove('downloading');
                            btn.innerHTML = '<i class="fa-solid fa-download"></i>';
                        }
                    }
                },
                downloadTrack(e, url, title) {
                    e.stopPropagation();
                    this.processDownload(url, title, e.currentTarget);
                },
                downloadCurrent() {
                    app.dom.fsMenu.classList.remove('active');
                    const track = app.state.allContextTracks[app.state.currentIndex];
                    if(track) {
                        app.utils.showToast("Starting Download...");
                        this.processDownload(track.preview, track.title, null);
                    }
                },
                addCurrentToPlaylist() {
                    app.dom.fsMenu.classList.remove('active');
                    const track = app.state.allContextTracks[app.state.currentIndex];
                    if(track) {
                        app.addToPlaylistPrompt(null, encodeURIComponent(JSON.stringify(track)));
                    }
                },
                shareCurrent() {
                    app.dom.fsMenu.classList.remove('active');
                    const track = app.state.allContextTracks[app.state.currentIndex];
                    if(!track) return;
                    if (navigator.share) {
                        navigator.share({
                            title: `Listen to ${track.title}`,
                            text: `Check out ${track.title} by ${track.artist} on Dhwani Premium`,
                            url: track.preview
                        }).catch(console.error);
                    } else {
                        navigator.clipboard.writeText(track.preview);
                        app.utils.showToast("Link copied to clipboard!");
                    }
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
